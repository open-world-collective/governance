name: Continuity Policy Check

on:
  push:
  pull_request:

jobs:
  check-continuity-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify continuity policy files
        run: bash scripts/check_continuity_policy.sh
      - name: Run policy check script tests
        run: bash tests/test_check_continuity_policy.sh
