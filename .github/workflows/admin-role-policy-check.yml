name: Admin Role Policy Check

on:
  push:
  pull_request:

jobs:
  check-admin-role-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify admin role policy files
        run: bash scripts/check_admin_role_policy.sh
      - name: Run policy check script tests
        run: bash tests/test_check_admin_role_policy.sh
